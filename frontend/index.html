<!DOCTYPE html>
<html lang="sk">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Moje portfólio</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>Vitajte na mojom portfóliu</h1>

        <div id="profil">
            <p>Načítavam dáta z backendu...</p>
        </div>
        <form id="kontaktnyFormular">
            <label for="first_name">Vaše meno: </label>
            <input type="text" id="first_name" autocomplete="name">
            <label for="formText">Správa: </label>
            <textarea name="formText" id="formText"></textarea>
            <button type="submit">Odoslať</button>
        </form>
        <script src="app.js"></script>
    </body>
</html>
